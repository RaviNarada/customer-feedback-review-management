name: Infrastructure - Plan & Apply

on:
  push:
    branches:
      - deployment
    paths:
      - 'feedback-infra/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  AWS_REGION: us-west-2

jobs:
  terraform-plan:
    name: Terraform - Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ./feedback-infra
        run: terraform init

      - name: Terraform Validate
        working-directory: ./feedback-infra
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ./feedback-infra
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
        run: terraform plan -out=tfplan -json > tfplan.json

      - name: Comment PR with plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('feedback-infra/tfplan.json', 'utf8');
            const plan = JSON.parse(planOutput);
            
            let comment = '## Terraform Plan\n```\n';
            plan.forEach(line => {
              if (line.type === 'planned_change') {
                comment += `${line.change.actions[0]}: ${line.change.type}.${line.change.name}\n`;
              }
            });
            comment += '```';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Save Plan as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: feedback-infra/tfplan
          retention-days: 7

  terraform-apply:
    name: Terraform - Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/deployment'
    environment:
      name: production-infrastructure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: feedback-infra/

      - name: Terraform Init (with S3 backend)
        working-directory: ./feedback-infra
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=production/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -upgrade

      - name: Terraform Apply
        working-directory: ./feedback-infra
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
        run: terraform apply -auto-approve tfplan

      - name: Terraform Output
        id: terraform
        working-directory: ./feedback-infra
        run: |
          echo "instance_id=$(terraform output -raw instance_id)" >> $GITHUB_OUTPUT
          echo "instance_ip=$(terraform output -raw instance_ip)" >> $GITHUB_OUTPUT

      - name: Update deployment secrets
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Store infrastructure outputs
        run: |
          echo "Instance ID: ${{ steps.terraform.outputs.instance_id }}"
          echo "Instance IP: ${{ steps.terraform.outputs.instance_ip }}"
