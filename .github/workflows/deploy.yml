name: CI/CD Pipeline
 
on:
  push:
    branches: [ deployment ]
 
jobs:
  build-and-push:
    name: Build Docker Images
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
 
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/feedback-server:latest
 
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/feedback-client:latest
 
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
 
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/feedback-server:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/feedback-client:latest
 
            docker stop feedback-server feedback-client 2>/dev/null || true
            docker rm feedback-server feedback-client 2>/dev/null || true
 
            docker network create feedback-net 2>/dev/null || true
 
            docker run -d --name feedback-server \
              --network feedback-net \
              -p 8080:8080 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              ${{ secrets.DOCKER_USERNAME }}/feedback-server:latest
 
            docker run -d --name feedback-client \
              --network feedback-net \
              -p 80:80 \
              ${{ secrets.DOCKER_USERNAME }}/feedback-client:latest
 
            echo "Deployment complete!"